controller_manager:
  ros__parameters:
    update_rate: 100  # Hz
    thread_priority: 50

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    left_forward_position_controller:
      type: forward_command_controller/ForwardCommandController

    left_forward_velocity_controller:
      type: forward_command_controller/ForwardCommandController

    left_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    left_gripper_controller:
      type: position_controllers/GripperActionController

    right_forward_position_controller:
      type: forward_command_controller/ForwardCommandController

    right_forward_velocity_controller:
      type: forward_command_controller/ForwardCommandController

    right_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    right_gripper_controller:
      type: position_controllers/GripperActionController

joint_state_broadcaster:
  ros__parameters:
    {}

left_forward_position_controller:
  ros__parameters:
    joints:
      - openarmx_left_joint1
      - openarmx_left_joint2
      - openarmx_left_joint3
      - openarmx_left_joint4
      - openarmx_left_joint5
      - openarmx_left_joint6
      - openarmx_left_joint7
      - openarmx_left_finger_joint1  # 加入夹爪，8DOF模式
    interface_name: position
    command_interfaces:
      - position
    state_interfaces:
      - position

left_forward_velocity_controller:
  ros__parameters:
    joints:
      - openarmx_left_joint1
      - openarmx_left_joint2
      - openarmx_left_joint3
      - openarmx_left_joint4
      - openarmx_left_joint5
      - openarmx_left_joint6
      - openarmx_left_joint7
    interface_name: velocity
    command_interfaces:
      - velocity
    state_interfaces:
      - velocity

left_joint_trajectory_controller:
  ros__parameters:
    joints:
      - openarmx_left_joint1
      - openarmx_left_joint2
      - openarmx_left_joint3
      - openarmx_left_joint4
      - openarmx_left_joint5
      - openarmx_left_joint6
      - openarmx_left_joint7
    interface_name: position
    command_interfaces:
      - position
    state_interfaces:
      - position

    state_publish_rate: 50.0 # Defaults to 50
    action_monitor_rate: 50.0 # Defaults to 20

    allow_partial_joints_goal: false # Defaults to false
    constraints:
      stopped_velocity_tolerance: 0.01 # Defaults to 0.01
      goal_time: 0.0 # Defaults to 0.0 (start immediately)

left_gripper_controller:
  ros__parameters:
    joint: openarmx_left_finger_joint1
    command_interfaces:
      - position
    state_interfaces:
      - position
      - effort
    goal_tolerance: 0.001
    max_effort: 14.0
    allow_stalling: true
    stall_velocity_threshold: 0.001
    stall_timeout: 10.0


right_forward_position_controller:
  ros__parameters:
    joints:
      - openarmx_right_joint1
      - openarmx_right_joint2
      - openarmx_right_joint3
      - openarmx_right_joint4
      - openarmx_right_joint5
      - openarmx_right_joint6
      - openarmx_right_joint7
      - openarmx_right_finger_joint1  # 加入夹爪，8DOF模式
    interface_name: position
    command_interfaces:
      - position
    state_interfaces:
      - position

right_forward_velocity_controller:
  ros__parameters:
    joints:
      - openarmx_right_joint1
      - openarmx_right_joint2
      - openarmx_right_joint3
      - openarmx_right_joint4
      - openarmx_right_joint5
      - openarmx_right_joint6
      - openarmx_right_joint7
    interface_name: velocity
    command_interfaces:
      - velocity
    state_interfaces:
      - velocity

right_joint_trajectory_controller:
  ros__parameters:
    joints:
      - openarmx_right_joint1
      - openarmx_right_joint2
      - openarmx_right_joint3
      - openarmx_right_joint4
      - openarmx_right_joint5
      - openarmx_right_joint6
      - openarmx_right_joint7
    interface_name: position
    command_interfaces:
      - position
    state_interfaces:
      - position

    state_publish_rate: 50.0 # Defaults to 50
    action_monitor_rate: 50.0 # Defaults to 20

    allow_partial_joints_goal: false # Defaults to false
    constraints:
      stopped_velocity_tolerance: 0.01 # Defaults to 0.01
      goal_time: 0.0 # Defaults to 0.0 (start immediately)

right_gripper_controller:
